# =========================================================
# Ambiente de Producción
#
# Servicios:
# - MySQL
# - NodeJS
# - Watcher CRUD
#
# Características:
# - Base de datos aislada
# - Network independiente
# - Reinicio automático
# - Monitoreo de archivos CRUD
# =========================================================

services:

  db:
    image: mysql:8.0
    container_name: ${DB_CONTAINER_NAME}
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    ports:
      - "${MYSQL_PORT}:3306"

    volumes:
      - db_prod_data:/var/lib/mysql
      # Respaldo original
      - ${BACKUP_SQL}:/tmp/backup.sql
      # Script de inicialización
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh

    networks:
      - prod_network

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: ${APP_CONTAINER_NAME}

    restart: unless-stopped

    ports:
      - "${APP_PORT}:${NODE_PORT}"

    environment:
      PORT: ${NODE_PORT}
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}

    depends_on:
      - db

    volumes:
      - .:/app
      - /app/node_modules

    networks:
      - prod_network

  watcher:

    image: alpine:latest

    container_name: crud_watcher

    volumes:
      - .:/app

    command: >
      sh -c "
      apk add --no-cache inotify-tools &&
      while inotifywait -r -e create -e modify /app; do
        echo 'Cambios detectados';
      done
      "

    networks:
      - prod_network

networks:
  prod_network:
    name: ${NETWORK_NAME}

volumes:
  db_prod_data: